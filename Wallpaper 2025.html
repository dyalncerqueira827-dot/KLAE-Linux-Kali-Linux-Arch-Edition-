<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>KLAE Linux</title>
  <style>
    /* Faz a imagem ocupar toda a tela */
    body {
      margin: 0;
      height: 100vh;
      background: url('2025.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      text-shadow: 2px 2px 10px black;
    }

    h1 {
      font-size: 3em;
      margin: 0.2em;
    }

    p {
      font-size: 1.5em;
      margin: 0.2em;

    img {
      width: 200px; /* Ajuste o tamanho do logo */
      margin-bottom: 20px;
    }

</head>
<body>
  <!-- Logo do KLAE -->
  <img src="logo.png" alt="KLAE Linux Logo">

</html>
